function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

return array

}

function shuffleAnswers(question){

let answers=[...question.a]
let correctAnswer=answers[question.c]

for(let i=answers.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=answers[i]
answers[i]=answers[j]
answers[j]=temp

}

let newCorrectIndex=answers.indexOf(correctAnswer)

return{
q:question.q,
a:answers,
c:newCorrectIndex
}

}

currentQuestion=shuffleAnswers(quizQuestions[current])
let q=currentQuestion

let html=`
<div style="margin-bottom:15px;font-size:18px;color:#aaa;">
Question ${startOffset+current+1}
</div>

<div class="question">${q.q}</div>
`

q.a.forEach((ans,i)=>{

html+=`<div class="answer" onclick="answer(${i})">${ans}</div>`

})

document.getElementById("quiz").innerHTML=html

}

function answer(i){

let q=currentQuestion

if(i===q.c){

correct++

wrongList=wrongList.filter(item=>item.q!==q.q)

}else{

if(!wrongList.some(item=>item.q===q.q)){
wrongList.push(q)
}

}

localStorage.setItem("wrongQuestions",JSON.stringify(wrongList))

current++

if(current>=quizQuestions.length){
finishQuiz()
}else{
showQuestion()
}

}

function finishQuiz(){

let total=quizQuestions.length
let percent=Math.round((correct/total)*100)
let wrong=total-correct

document.getElementById("quiz").innerHTML=""

document.getElementById("results").innerHTML=
`
Score: ${correct} / ${total}<br>
Wrong: ${wrong}<br>
Percentage: ${percent}%<br><br>

<button onclick="restartQuiz()">Retry Quiz</button>
<button onclick="studyWrong()">Practice Wrong Questions</button>
`

}

function restartQuiz(){

current=0
correct=0
showQuestion()

}

function startQuiz(amount){

quizQuestions=allQuestions.slice(0,amount)

current=0
correct=0
startOffset=0
currentQuestion=null

document.getElementById("results").innerHTML=""

showQuestion()

}

function startCustomQuiz(){

let start=Number(document.getElementById("startQuestion").value)
let amount=Number(document.getElementById("questionCount").value)

if(!start)start=1

if(!amount||amount<1){
alert("Enter number of questions")
return
}

startOffset=start-1

quizQuestions=allQuestions.slice(startOffset,startOffset+amount)

current=0
correct=0
currentQuestion=null

document.getElementById("results").innerHTML=""

showQuestion()

}

function startFullExam(){

quizQuestions=shuffle([...allQuestions])

current=0
correct=0
startOffset=0
currentQuestion=null

wrongList=[]
localStorage.removeItem("wrongQuestions")

document.getElementById("results").innerHTML=""

showQuestion()

}

function studyWrong(){

wrongList=JSON.parse(localStorage.getItem("wrongQuestions")||"[]")

if(wrongList.length===0){
alert("You have no wrong questions yet.")
return
}

quizQuestions=shuffle([...wrongList])

current=0
correct=0
startOffset=0
currentQuestion=null

showQuestion()

}

</script>
